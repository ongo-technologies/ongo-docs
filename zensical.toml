[project]
site_name = "CarWash Qatar"
site_description = "Product documentation for Qatar's car wash aggregator platform"
site_author = "CarWash Qatar Team"
site_url = "https://yourusername.github.io/cws-docs/"
repo_name = "cws-docs"
repo_url = "https://github.com/yourusername/cws-docs"
edit_uri = "edit/main/docs/"
copyright = "&copy; 2025 CarWash Qatar"

extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Product" = [
    { "Product" = "product/index.md" },
    { "Overview" = "product/overview.md" },
    { "Architecture" = "product/architecture.md" },
    { "Roadmap" = "product/roadmap.md" },
  ]},
  { "Development" = [
    { "Development" = "development/index.md" },
    { "Requirements" = "development/requirements.md" },
    { "Database Schema" = "development/database-schema.md" },
  ]},
  { "Design" = [
    { "Design" = "design/index.md" },
    { "Colors" = "design/colors.md" },
    { "Typography" = "design/typography.md" },
    { "Spacing & Radius" = "design/spacing.md" },
    { "Motion" = "design/motion.md" },
    { "Buttons & Badges" = "design/buttons.md" },
    { "Form Controls" = "design/forms.md" },
    { "Navigation & Feedback" = "design/navigation.md" },
    { "Developer Tokens" = "design/developer-tokens.md" },
  ]},
  { "Reference" = [
    { "Reference" = "reference/index.md" },
    { "Contributing" = "contributing.md" },
  ]},
  { "Legal" = [
    { "Legal" = "legal/index.md" },
    { "Privacy Policy" = "legal/privacy-policy.md" },
    { "Terms & Conditions" = "legal/terms-and-conditions.md" },
  ]},
]

# ----------------------------------------------------------------------------
# Theme configuration
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
custom_dir = "docs/overrides"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tracking",
    "navigation.top",
    "navigation.indexes",
    "navigation.path",
    "navigation.footer",
    "navigation.prune",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
logo = "material/car-wash"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "white"
accent = "blue"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "blue"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
title = "On this page"

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
[project.plugins.search]
lang = "en"
