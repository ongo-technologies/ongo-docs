site_name: CarWash Qatar
site_description: Product documentation for Qatar's car wash aggregator platform
site_author: CarWash Qatar Team
site_url: https://yourusername.github.io/cws-docs/

# Repository
repo_name: cws-docs
repo_url: https://github.com/yourusername/cws-docs
edit_uri: edit/main/docs/

# Configuration
theme:
  name: material
  language: en
  direction: ltr
  custom_dir: docs/overrides

  # Clean, minimal color palette
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Modern, clean fonts
  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

  icon:
    logo: material/car-wash
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      lang: en
  - mermaid2:
      arguments:
        theme: neutral

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Simplified navigation - 4 main sections
nav:
  - Home: index.md
  - Product:
      - Overview: product/overview.md
      - Architecture: product/architecture.md
      - Roadmap: product/roadmap.md
  - Development:
      - Requirements: development/requirements.md
      - User Stories: development/user-stories.md
  - Reference:
      - Style Guide: style-guide.md
      - Contributing: contributing.md

# Custom CSS
extra_css:
  - stylesheets/extra.css

# Custom JavaScript
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

# Footer
extra:
  generator: false

copyright: "&copy; 2025 CarWash Qatar"
